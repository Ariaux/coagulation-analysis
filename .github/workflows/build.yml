name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyinstaller opencv-python numpy
      - run: pyinstaller --onedir --name "CoagulationAnalysis" app_standalone.py
      - run: Compress-Archive -Path dist/CoagulationAnalysis/* -DestinationPath CoagulationAnalysis-Windows.zip
      - uses: softprops/action-gh-release@v1
        with:
          files: CoagulationAnalysis-Windows.zip
          tag_name: v1.0
          name: "Coagulation Analysis"
          body: "Download the zip, unzip, drag a slide image onto CoagulationAnalysis.exe to analyze."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyinstaller opencv-python numpy
      - run: pyinstaller --onedir --name "CoagulationAnalysis" app_standalone.py
      - run: cd dist && zip -r ../../CoagulationAnalysis-Mac.zip CoagulationAnalysis.app
      - uses: softprops/action-gh-release@v1
        with:
          files: CoagulationAnalysis-Mac.zip
          tag_name: v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
