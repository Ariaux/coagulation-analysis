name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyinstaller opencv-python numpy
      - run: pyinstaller --onedir --name "CoagulationAnalysis" app_standalone.py

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/CoagulationAnalysis/* -DestinationPath CoagulationAnalysis-Windows.zip

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: |
          ls -la dist/
          cd dist && zip -r ../CoagulationAnalysis-Mac.zip .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CoagulationAnalysis-${{ runner.os == 'Windows' && 'Windows' || 'Mac' }}.zip
          tag_name: latest
          name: "Coagulation Analysis"
          body: "Latest build. Download, unzip, drag a slide image onto the executable.\n\nWindows: CoagulationAnalysis.exe\nMac: CoagulationAnalysis"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
